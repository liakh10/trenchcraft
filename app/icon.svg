<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0b1020"/>
  <!-- isometric gold voxel cube -->
  <!-- top face -->
  <polygon points="16,4 28,10.5 16,17 4,10.5" fill="#FFD24D" stroke="#1a1205" stroke-width="1" stroke-linejoin="round"/>
  <!-- left face -->
  <polygon points="4,10.5 16,17 16,30 4,23.5" fill="#C8902A" stroke="#1a1205" stroke-width="1" stroke-linejoin="round"/>
  <!-- right face -->
  <polygon points="28,10.5 16,17 16,30 28,23.5" fill="#9c6e1d" stroke="#1a1205" stroke-width="1" stroke-linejoin="round"/>
  <!-- sparkles on the top face -->
  <rect x="12" y="9" width="2" height="2" fill="#fff4c2"/>
  <rect x="18" y="11" width="2" height="2" fill="#fff4c2"/>
</svg>
